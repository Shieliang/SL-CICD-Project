<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL-CI/CD-Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #232F3E; /* AWS 经典深蓝色 */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #37475A;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        h1 { color: #FF9900; /* AWS 经典橙色 */ }
        p { font-size: 1.2em; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Hello from SL-CI/CD-Project!</h1>
        <p>This web application is containerized with <b>Docker</b> <br>
           and orchestrated by <b>Amazon EKS (Kubernetes)</b>.</p>
        <p>Automated Provisioning via <b>AWS CloudFormation</b>.</p>
        <p><i>Ready for the next DevOps challenge!</i></p>
    </div>
</body>
</html>
